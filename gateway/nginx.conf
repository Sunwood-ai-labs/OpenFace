worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    resolver 127.0.0.11 valid=10s ipv6=off;

    sendfile        on;
    keepalive_timeout  65;

    # Allow arbitrarily large request bodies (Git LFS uploads can be huge).
    client_max_body_size 0;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $request_uri $frontend_upstream {
        default frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # ------------------------------------------------------------------
        # Forgejo (Git UI, API, LFS). ROOT_URL is configured with a "/git/"
        # suffix, so Forgejo itself generates links/redirects under /git/.
        # We proxy the sub-path straight through without stripping it.
        # ------------------------------------------------------------------
        location /git/ {
            proxy_pass http://forgejo:3000/;

            # Forgejo lives at /git, but OpenFace's server-side control route
            # also needs the signed-in session cookie to verify repo rights.
      proxy_cookie_path ~^/git/?$ /;

            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Required for large Git LFS pushes/pulls: don't buffer the
            # request body on disk before forwarding it upstream.
            proxy_request_buffering off;
            client_max_body_size 0;

            # Forgejo also speaks SSH-over-HTTP style long-lived connections
            # for some git-http-backend operations; generous timeouts help.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ------------------------------------------------------------------
        # Running Spaces (Gradio apps) proxied by spaces-runner, with
        # WebSocket support for live Gradio UI updates.
        # ------------------------------------------------------------------
        location /run/ {
            proxy_pass http://spaces-runner:8000/;

            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ------------------------------------------------------------------
        # spaces-runner management API, mounted at /runner-api/ and mapped
        # to /api/ on the upstream service.
        # ------------------------------------------------------------------
        location /runner-api/ {
            proxy_pass http://spaces-runner:8000/api/;

            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ------------------------------------------------------------------
        # Everything else → the Next.js frontend (HF-style portal).
        # WebSocket headers are included for HMR safety even though they
        # are unnecessary in a production build.
        # ------------------------------------------------------------------
        location / {
            proxy_pass http://$frontend_upstream;

            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
