name: Feature request
description: Propose an improvement to OpenFace
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should be improved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: scope
    attributes:
      label: Primary scope
      options:
        - Models or datasets
        - Spaces
        - Skills, MCPs, or Prompts
        - Pages / CI
        - Operations / security
        - Documentation
        - Other
    validations:
      required: true
