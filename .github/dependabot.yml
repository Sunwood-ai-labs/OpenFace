version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]
    groups:
      frontend:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]
    groups:
      documentation:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns: ['*']
        update-types: [minor, patch]
