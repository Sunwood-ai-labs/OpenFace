name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            docs/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend --no-audit --no-fund

      - name: Audit production dependencies
        run: npm audit --prefix frontend --omit=dev --audit-level=high

      - name: Check frontend types
        run: npm run lint --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Install documentation dependencies
        run: npm ci --prefix docs --no-audit --no-fund

      - name: Build documentation
        env:
          VITEPRESS_BASE: /OpenFace/
        run: npm run docs:build --prefix docs

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Compile runner Python sources
        run: python -m compileall -q spaces-runner
