name: openface

networks:
  openface:
    name: openface

volumes:
  forgejo-data:
    name: openface_forgejo-data
  shared-token:
    name: openface_shared-token
  agent-metrics-data:
    name: openface_agent-metrics-data
  forgejo-runner-data:
    name: openface_forgejo-runner-data
  maintenance-agent-data:
    name: openface_maintenance-agent-data
  postgres-data:
    name: openface_postgres-data

services:
  postgres:
    image: postgres:17-alpine
    container_name: openface-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openface}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openface-postgres}
      POSTGRES_DB: forgejo
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - openface
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openface} -d forgejo"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  gateway:
    build:
      context: ./gateway
    container_name: openface-gateway
    restart: unless-stopped
    ports:
      - "${OPENFACE_PORT:-8090}:80"
      - "${OPENFACE_HTTPS_PORT:-8443}:443"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - ./gateway/certs:/certs
    networks:
      - openface
    depends_on:
      - frontend
      - forgejo
      - spaces-runner

  frontend:
    build:
      context: ./frontend
    container_name: openface-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      FORGEJO_API: http://forgejo:3000/api/v1
      FORGEJO_TOKEN_FILE: /shared/token
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://localhost:8443}
      RUNNER_API: http://spaces-runner:8000/api
      README_CACHE_TTL_SECONDS: ${README_CACHE_TTL_SECONDS:-300}
    volumes:
      - shared-token:/shared:ro
    networks:
      - openface
    depends_on:
      forgejo:
        condition: service_healthy

  forgejo:
    build:
      context: ./forgejo
    container_name: openface-forgejo
    restart: unless-stopped
    ports:
      - "2222:22"
    expose:
      - "3000"
    environment:
      USER_UID: 1000
      USER_GID: 1000
      FORGEJO__DEFAULT__APP_NAME: OpenFace
      FORGEJO__server__ROOT_URL: ${PUBLIC_BASE_URL:-https://localhost:8443}/git/
      FORGEJO__server__HTTP_PORT: 3000
      FORGEJO__server__SSH_PORT: 22
      FORGEJO__server__LFS_START_SERVER: "true"
      FORGEJO__lfs__STORAGE_TYPE: local
      FORGEJO__service__DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-true}
      FORGEJO__session__COOKIE_NAME: openface_session
      FORGEJO__webhook__ALLOWED_HOST_LIST: "*"
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: postgres:5432
      FORGEJO__database__NAME: forgejo
      FORGEJO__database__USER: ${POSTGRES_USER:-openface}
      FORGEJO__database__PASSWD: ${POSTGRES_PASSWORD:-openface-postgres}
      FORGEJO__database__SSL_MODE: disable
      FORGEJO__actions__ENABLED: "true"
    volumes:
      - forgejo-data:/data
    networks:
      - openface
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  spaces-runner:
    build:
      context: ./spaces-runner
    container_name: openface-spaces-runner
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      FORGEJO_API: http://forgejo:3000/api/v1
      FORGEJO_TOKEN_FILE: /shared/token
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://localhost:8443}
      DOCKER_NETWORK: openface
      IDLE_TIMEOUT_MINUTES: ${IDLE_TIMEOUT_MINUTES:-0}
      MAX_RUNNING_SPACES: ${MAX_RUNNING_SPACES:-24}
      OPENFACE_GPU_WORKERS_ENABLED: ${OPENFACE_GPU_WORKERS_ENABLED:-false}
      OPENFACE_GPU_WORKER_LEASE_SECONDS: ${OPENFACE_GPU_WORKER_LEASE_SECONDS:-90}
      OPENFACE_GPU_WORKER_STALE_SECONDS: ${OPENFACE_GPU_WORKER_STALE_SECONDS:-120}
      AGENT_DATA_DIR: /data/agents
      DATABASE_URL: postgresql://${POSTGRES_USER:-openface}:${POSTGRES_PASSWORD:-openface-postgres}@postgres:5432/openface_metrics
    volumes:
      - shared-token:/shared:ro
      - agent-metrics-data:/data/agents
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - openface
    depends_on:
      forgejo:
        condition: service_healthy
      postgres:
        condition: service_healthy

  seed:
    build:
      context: ./seed
    container_name: openface-seed
    restart: "no"
    environment:
      OPENFACE_ADMIN_USER: ${OPENFACE_ADMIN_USER:-openface-admin}
      OPENFACE_ADMIN_PASSWORD: ${OPENFACE_ADMIN_PASSWORD:-openface1234}
      OPENFACE_ADMIN_EMAIL: ${OPENFACE_ADMIN_EMAIL:-admin@example.com}
      FORGEJO_API: http://forgejo:3000/api/v1
      FORGEJO_TOKEN_FILE: /shared/token
      FORGEJO_CONTAINER_NAME: openface-forgejo
      MAINTENANCE_WEBHOOK_URL: http://maintenance-agent:8010/webhooks/forgejo
      HF_CLONE_TIMEOUT_SECONDS: ${HF_CLONE_TIMEOUT_SECONDS:-20}
    volumes:
      - shared-token:/shared
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - openface
    depends_on:
      forgejo:
        condition: service_healthy

  maintenance-agent:
    build:
      context: ./maintenance-agent
    container_name: openface-maintenance-agent
    restart: unless-stopped
    expose:
      - "8010"
    env_file:
      - ${ZAI_AGENT_CONFIG:-./maintenance-agent/zai.example.env}
    environment:
      FORGEJO_API: http://forgejo:3000/api/v1
      FORGEJO_GIT_BASE: http://forgejo:3000
      FORGEJO_TOKEN_FILE: /shared/maintenance-token
      WEBHOOK_SECRET_FILE: /shared/maintenance-webhook-secret
      ZAI_ANTHROPIC_BASE_URL: ${ZAI_ANTHROPIC_BASE_URL:-https://api.z.ai/api/anthropic}
      MAINTENANCE_MODEL: ${MAINTENANCE_MODEL:-glm-5.2}
      LITELLM_MASTER_KEY: ""
      WEBUI_SECRET_KEY: ""
      MAINTENANCE_ALLOWED_OWNER: ${MAINTENANCE_ALLOWED_OWNER:-openface}
      MAINTENANCE_CLAUDE_USER: maintainer
      MAINTENANCE_GOAL_TIMEOUT_SECONDS: ${MAINTENANCE_GOAL_TIMEOUT_SECONDS:-3600}
      MAINTENANCE_MAX_WORKERS: ${MAINTENANCE_MAX_WORKERS:-2}
      MAINTENANCE_AUTO_MERGE: ${MAINTENANCE_AUTO_MERGE:-true}
      MAINTENANCE_DATA_DIR: /data
      MAINTENANCE_WORKSPACE_DIR: /work
      MAINTENANCE_AGENT_TOKEN_DIR: /shared/agent-tokens
      DATABASE_URL: postgresql://${POSTGRES_USER:-openface}:${POSTGRES_PASSWORD:-openface-postgres}@postgres:5432/openface_maintenance
    volumes:
      - shared-token:/shared:ro
      - maintenance-agent-data:/data
    networks:
      - openface
    depends_on:
      seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Isolated Docker daemon for Forgejo Actions. Workflows can build static
  # sites but cannot inspect or control OpenFace's host Docker containers.
  forgejo-actions-dind:
    image: docker:27-dind
    container_name: openface-forgejo-actions-dind
    restart: unless-stopped
    privileged: true
    command: ["dockerd", "-H", "tcp://0.0.0.0:2375", "--tls=false"]
    networks:
      - openface
    healthcheck:
      test: ["CMD-SHELL", "DOCKER_HOST=tcp://localhost:2375 docker info >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  forgejo-actions-runner:
    build:
      context: ./forgejo-actions-runner
    container_name: openface-forgejo-actions-runner
    restart: unless-stopped
    environment:
      FORGEJO_INSTANCE_URL: http://forgejo:3000
      FORGEJO_RUNNER_NAME: openface-pages-runner
      DOCKER_HOST: tcp://forgejo-actions-dind:2375
    volumes:
      - forgejo-runner-data:/data
      - shared-token:/shared:ro
    networks:
      - openface
    depends_on:
      seed:
        condition: service_completed_successfully
      forgejo-actions-dind:
        condition: service_healthy
